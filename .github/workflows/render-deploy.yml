name: CI & Deploy to Render

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug frontend layout
        run: |
          echo "Listing frontend:"
          ls -la frontend || true
          echo "Type of frontend/app:"
          file frontend/app || true
          echo "Node and npm versions:"
          node -v || true
          npm -v || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install frontend deps
        working-directory: frontend
        run: |
          echo "Node $(node -v), npm $(npm -v)"
          if [ -f package-lock.json ]; then
            echo "Using npm ci (package-lock.json found)"
            npm ci
          else
            echo "package-lock.json not found — falling back to npm install"
            npm install
          fi

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install backend deps
        working-directory: backend_service
        run: npm ci || npm install

      - name: Backend quick smoke (start & stop)
        working-directory: backend_service
        run: |
          # start in background, wait briefly, then kill (smoke check)
          npm run start &
          sleep 3
          curl --fail --silent --show-error http://localhost:3000/health || true
          pkill -f src/main.js || true

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/.next

  deploy:
    name: Trigger Render Deploy(s)
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger frontend deploy on Render via API
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ secrets.RENDER_FRONTEND_SERVICE_ID }}
        run: |
          echo "Triggering deploy for frontend service $SERVICE_ID"
          curl -s -X POST "https://api.render.com/v1/services/${SERVICE_ID}/deploys" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -d "{\"clearCache\":true,\"branch\":\"main\",\"commitHash\":\"${GITHUB_SHA}\"}" \
            | tee render-frontend-deploy.json

      - name: Trigger backend deploy on Render via API
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ secrets.RENDER_BACKEND_SERVICE_ID }}
        run: |
          echo "Triggering deploy for backend service $SERVICE_ID"
          curl -s -X POST "https://api.render.com/v1/services/${SERVICE_ID}/deploys" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -d "{\"clearCache\":true,\"branch\":\"main\",\"commitHash\":\"${GITHUB_SHA}\"}" \
            | tee render-backend-deploy.json
